name: Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Create dist archive
        run: zip -r dist.zip dist/ skills/ LICENSE.txt README.md THIRD-PARTY-NOTICES.txt

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
